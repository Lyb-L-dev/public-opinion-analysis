<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置成功</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

       .auth-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }

       .success-icon {
            font-size: 80px;
            color: #4caf50;
            margin-bottom: 20px;
        }

       .success-message h2 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 15px;
        }

       .success-message p {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

       .login-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(to right, #3498db, #2c3e50);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="success-icon">✓</div>
        <div class="success-message">
            <h2>密码重置成功</h2>
            <p>您的密码已成功更新，请使用新密码登录</p>
        </div>
        <a href="{{ url_for('auth.login') }}" class="login-btn">立即登录</a>
    </div>
</body>
</html>
